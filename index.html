<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4b1232" />
  <title>Varmisha Premium Mobile Invitation</title>
  <link rel="icon" href="favicon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="bgMusic" loop preload="auto" playsinline>
    <source src="assets/audio/music.mp3" type="audio/mpeg" />
  </audio>

  <div class="phone-shell">
    <main class="slider" id="slider" aria-label="Varmisha Invitation">
      <section class="slide active" data-page="1">
        <img src="assets/images/01 - Cover.png" alt="Varmisha cover page" />
        <div class="cover-actions">
          <button class="gold-btn" id="enterBtn">✨ Enter Invitation</button>
          <a class="gold-btn second" id="browserBtn" href="https://varmisha.netlify.app/">🌐 Open Full Screen</a>
        </div>
      </section>
      <section class="slide" data-page="2"><img src="assets/images/02 - Cover.png" alt="Invitation page 2" /></section>
      <section class="slide" data-page="3"><img src="assets/images/02 - Invitation.png" alt="Invitation page 3" /></section>
      <section class="slide" data-page="4"><img src="assets/images/03 - Family.png" alt="Family page" /></section>
      <section class="slide" data-page="5"><img src="assets/images/04 - Grand Entrance (10.30).png" alt="Grand entrance" /></section>
      <section class="slide" data-page="6"><img src="assets/images/05 - Aarathi Welcome (11.00).png" alt="Aarathi welcome" /></section>
      <section class="slide" data-page="7"><img src="assets/images/06 - Maternal Uncle's Ceremony (11.30).png" alt="Maternal uncle ceremony" /></section>
      <section class="slide" data-page="8"><img src="assets/images/07 - Blessings (12.00).png" alt="Blessings" /></section>
      <section class="slide" data-page="9"><img src="assets/images/08 - Lunch (12.30).png" alt="Lunch" /></section>
      <section class="slide" data-page="10"><img src="assets/images/09 - Photography (1.00).png" alt="Photography" /></section>
      <section class="slide" data-page="11"><img src="assets/images/10 - Cake Cutting (2.30).png" alt="Cake cutting" /></section>
      <section class="slide" data-page="12"><img src="assets/images/11 - No Presents.png" alt="No presents" /></section>
    </main>

    <div class="nav-area">
      <button class="nav-btn" id="prevBtn" aria-label="Previous page">‹</button>
      <div class="center-nav">
        <div class="page-count"><span id="pageNow">1</span> / <span id="pageTotal">12</span></div>
        <div class="dots" id="dots"></div>
      </div>
      <button class="nav-btn" id="nextBtn" aria-label="Next page">›</button>
    </div>

    <div class="quick-actions">
      <a href="https://forms.gle/j2ULEXyF5mwENLyC9" target="_blank" rel="noopener">RSVP</a>
      <a href="https://www.google.com/maps/search/?api=1&query=Hamshiya+Mahal+37+Ramanathan+Road+Jaffna" target="_blank" rel="noopener">Directions</a>
      <button id="shareBtn">Share</button>
    </div>
  </div>

  <button class="floating music" id="musicBtn" aria-label="Play music">🎵</button>
  <button class="floating home" id="homeBtn" aria-label="Go to first page">⌂</button>

  <div class="toast" id="toast">Tap 🎵 to play music</div>

  <script src="script.js"></script>
</body>
</html>
